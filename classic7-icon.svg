<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Classic 7 Photo Viewer favicon — the glossy Aero photo-frame icon,
       redrawn as SVG (source art: classic-photo-viewer/app/Images). -->
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#feffff"/>
      <stop offset="1" stop-color="#c3d9ee"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f95dd"/>
      <stop offset="1" stop-color="#9bd4f6"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#83cf46"/>
      <stop offset="1" stop-color="#3d9127"/>
    </linearGradient>
    <clipPath id="photo">
      <rect x="9" y="11" width="46" height="42" rx="1.5"/>
    </clipPath>
  </defs>
  <rect x="2" y="4" width="60" height="56" rx="6" fill="url(#frame)" stroke="#8aa8c8" stroke-width="1"/>
  <g clip-path="url(#photo)">
    <rect x="9" y="11" width="46" height="42" fill="url(#sky)"/>
    <circle cx="45" cy="21" r="7" fill="#ffe9a8" opacity="0.55"/>
    <circle cx="45" cy="21" r="4" fill="#ffd24a"/>
    <circle cx="45" cy="21" r="2.6" fill="#fff2c0"/>
    <path d="M17.5 19.5c-1.9 0-3.4 1-3.7 2.4-.2 1.4 1 2.6 3 2.6h6.8c1.8 0 3.2-1 3.2-2.4 0-1.3-1.2-2.3-2.8-2.3-.4-1.4-1.8-2.4-3.6-2.4-1.4 0-2.5.8-2.9 2.1z" fill="#ffffff" opacity="0.95"/>
    <path d="M9 42c10-4 22-6.5 30-7.5 6.5-.8 12-.7 16-.1V53H9z" fill="url(#grass)"/>
  </g>
  <rect x="9" y="11" width="46" height="42" rx="1.5" fill="none" stroke="#3d6f9a" stroke-width="1" opacity="0.6"/>
</svg>
